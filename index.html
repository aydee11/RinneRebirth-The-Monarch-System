<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RinneRebirth // Personal Reset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030303; color: #e4e4e7; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(139, 92, 246, 0.2); }
        .task-item { transition: all 0.2s ease; }
        .task-item.completed { opacity: 0.6; }
        .task-item.completed span { text-decoration: line-through; color: #71717a; }
        .sync-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .sync-connected { background: radial-gradient(circle, rgba(34, 197, 94, 0.2) 0%, rgba(34, 197, 94, 0) 70%); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8">
            <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-violet-500 to-fuchsia-500">RINNE REBIRTH</h1>
            <p class="text-zinc-500 font-mono text-sm uppercase tracking-widest mt-1">System Reset Protocol // Online</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Focus Tasks Section -->
            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4">Focus Tasks</h2>
                
                <!-- Task Input -->
                <div class="mb-4 flex gap-2">
                    <input 
                        type="text" 
                        id="task-input" 
                        placeholder="Add a new task..." 
                        class="flex-1 bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-violet-500 transition"
                    >
                    <button 
                        id="add-btn" 
                        class="bg-violet-600 hover:bg-violet-700 px-4 py-2 rounded font-semibold text-sm transition"
                    >+</button>
                </div>

                <!-- Task List -->
                <ul id="task-list" class="space-y-2 text-sm font-mono">
                    <!-- Tasks will be dynamically added here -->
                </ul>

                <!-- Completion Stats -->
                <div class="mt-4 pt-4 border-t border-zinc-700 text-xs text-zinc-500">
                    <p>Completed: <span id="completed-count">0</span> / <span id="total-count">0</span></p>
                </div>
            </div>

            <!-- Sync Status Section -->
            <div class="glass p-6 rounded-2xl flex flex-col items-center justify-center">
                <h2 class="text-lg font-bold mb-4">Sync Status</h2>
                
                <div id="sync-indicator" class="relative w-24 h-24 rounded-full border-4 border-violet-900 flex items-center justify-center text-xs font-bold text-violet-400 sync-connected sync-pulse mb-4">
                    SYNC
                </div>

                <button 
                    id="sync-btn" 
                    class="bg-violet-600 hover:bg-violet-700 px-6 py-2 rounded font-semibold text-sm transition"
                >
                    Manual Sync
                </button>

                <p id="sync-status" class="text-xs text-zinc-600 mt-3">Last sync: Never</p>
            </div>
        </div>
    </div>

    <script>
        // Load tasks from localStorage
        const loadTasks = () => {
            const saved = localStorage.getItem('rinneTasks');
            return saved ? JSON.parse(saved) : [
                { id: 1, text: 'Clean Room Desk', completed: false },
                { id: 2, text: 'Save for MacBook', completed: false }
            ];
        };

        // Save tasks to localStorage
        const saveTasks = (tasks) => {
            localStorage.setItem('rinneTasks', JSON.stringify(tasks));
        };

        let tasks = loadTasks();
        let nextId = Math.max(...tasks.map(t => t.id), 0) + 1;

        const renderTasks = () => {
            const taskList = document.getElementById('task-list');
            taskList.innerHTML = '';

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item flex items-center gap-2 p-2 rounded hover:bg-zinc-900/50 transition ${task.completed ? 'completed' : ''}`;
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = task.completed;
                checkbox.className = 'cursor-pointer accent-violet-500';
                checkbox.addEventListener('change', () => toggleTask(task.id));

                const span = document.createElement('span');
                span.textContent = task.text;
                span.className = 'flex-1';

                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '×';
                deleteBtn.className = 'text-zinc-600 hover:text-red-500 font-bold transition text-lg';
                deleteBtn.addEventListener('click', () => deleteTask(task.id));

                li.appendChild(checkbox);
                li.appendChild(span);
                li.appendChild(deleteBtn);
                taskList.appendChild(li);
            });

            updateStats();
        };

        const toggleTask = (id) => {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks(tasks);
                renderTasks();
            }
        };

        const deleteTask = (id) => {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks(tasks);
            renderTasks();
        };

        const addTask = () => {
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            
            if (text) {
                tasks.push({ id: nextId++, text, completed: false });
                saveTasks(tasks);
                input.value = '';
                renderTasks();
            }
        };

        const updateStats = () => {
            const completed = tasks.filter(t => t.completed).length;
            document.getElementById('completed-count').textContent = completed;
            document.getElementById('total-count').textContent = tasks.length;
        };

        const performSync = () => {
            const syncIndicator = document.getElementById('sync-indicator');
            syncIndicator.classList.remove('sync-connected');
            
            // Simulate sync animation
            setTimeout(() => {
                syncIndicator.classList.add('sync-connected');
                const now = new Date().toLocaleTimeString();
                document.getElementById('sync-status').textContent = `Last sync: ${now}`;
            }, 500);
        };

        // Event listeners
        document.getElementById('add-btn').addEventListener('click', addTask);
        document.getElementById('task-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
        document.getElementById('sync-btn').addEventListener('click', performSync);

        // Initial render
        renderTasks();
    </script>
</body>
</html>
